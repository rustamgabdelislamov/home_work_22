{% extends 'catalog/base.html' %}
{% load my_tags %}
{% block title %}Каталог{% endblock %}
{% block content %}

<h2>Форма для продукта</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'catalog:product_list' %}" class="btn btn-primary">Отмена</a>
</form>

{% endblock %}
