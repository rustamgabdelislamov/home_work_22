{% extends 'blog/base.html' %}
{% load my_tags %}
{% block title %}Список блогов{% endblock %}
{% block content %}

<h2>Удаления блога</h2>
<p>Вы действительно хотите удалить {{ blog.title }}</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'blog:blog_list' %}" class="btn btn-primary">Отмена</a>
</form>

{% endblock %}
